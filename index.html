<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Website 💖</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="container">
        <h1>Welcome to Our Special Place!</h1>
        <div id="content">
            <!-- Replace with your own vibrant photos -->
            <img src="your-photo1.jpg" alt="Special photo 1" class="photo">
            <img src="your-photo2.jpg" alt="Special photo 2" class="photo">
        </div>

        <div id="message-container">
            <p>Thank you for being part of my world! 💖</p>
        </div>

        <!-- Confetti Button -->
        <button id="confettiButton">🎉 Celebrate!</button>
    </div>

    <!-- The cat that follows the cursor -->
    <div id="cat-following" class="cat">
        <img src="cat.png" alt="Cute cat" id="cat">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
